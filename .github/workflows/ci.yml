name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore skipper-dotnet.sln

      - name: Build
        run: dotnet build skipper-dotnet.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test skipper-dotnet.sln \
            --no-build \
            --configuration Release \
            --filter "FullyQualifiedName!~Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: integration

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and build
        run: |
          dotnet restore skipper-dotnet.sln
          dotnet build skipper-dotnet.sln --no-restore --configuration Release

      - name: Run integration tests
        env:
          SKIPPER_SPREADSHEET_ID: ${{ secrets.SKIPPER_SPREADSHEET_ID }}
          GOOGLE_CREDS_B64: ${{ secrets.GOOGLE_CREDS_B64 }}
        run: |
          dotnet test tests/GetSkipper.Integration.Tests \
            --no-build \
            --configuration Release

  sync:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: integration

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and build
        run: |
          dotnet restore skipper-dotnet.sln
          dotnet build skipper-dotnet.sln --no-restore --configuration Release

      - name: Run tests in sync mode
        env:
          SKIPPER_MODE: sync
          SKIPPER_SPREADSHEET_ID: ${{ secrets.SKIPPER_SPREADSHEET_ID }}
          GOOGLE_CREDS_B64: ${{ secrets.GOOGLE_CREDS_B64 }}
        run: |
          dotnet test tests/GetSkipper.Integration.Tests \
            --no-build \
            --configuration Release
